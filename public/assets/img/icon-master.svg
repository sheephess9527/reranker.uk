<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Master app icon (full-bleed square; iOS/Android apply their own corner mask).
       Concept: a ranked list — top bar vibrant (most relevant), fading down. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2050"/>
      <stop offset="0.55" stop-color="#0f1228"/>
      <stop offset="1" stop-color="#0a0c16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.22" r="0.95">
      <stop offset="0" stop-color="#7c8bff" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#7c8bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <g filter="url(#sh)">
    <rect x="232" y="234" width="560" height="132" rx="66" fill="url(#bar)"/>
    <rect x="232" y="446" width="420" height="132" rx="66" fill="#4a4fc4"/>
    <rect x="232" y="658" width="280" height="132" rx="66" fill="#363b6e"/>
  </g>

  <!-- glossy highlight on the top (winning) bar -->
  <rect x="232" y="234" width="560" height="62" rx="31" fill="url(#sheen)"/>
</svg>
